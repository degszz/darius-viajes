  <rect x="978" y="20" width="202" height="48" rx="24" fill="rgba(240,180,41,0.12)" stroke="rgba(240,180,41,0.25)" stroke-width="1"/>
  <text x="1079" y="51" text-anchor="middle" font-family="system-ui, -apple-system, Inter, sans-serif" font-size="16" font-weight="600" fill="#F0B429" letter-spacing="0.5">20+ años de experiencia</text>
