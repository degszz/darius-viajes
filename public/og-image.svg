    <text x="12" y="0" fill="rgba(255,255,255,0.15)" font-size="14">|</text>
    <circle cx="100" cy="-6" r="6" fill="#F0B429"/>
    <text x="120" y="0">Cruceros</text>
    <text x="228" y="0" fill="rgba(255,255,255,0.15)" font-size="14">|</text>
    <circle cx="316" cy="-6" r="6" fill="#14C9C3"/>
